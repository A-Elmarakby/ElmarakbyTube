[pytest]
# ═══════════════════════════════════════════════════════════════════
#  ElmarakbyTube — pytest configuration
#  Run from the PROJECT ROOT (the folder that contains main.py)
# ═══════════════════════════════════════════════════════════════════

# ── Test discovery ──────────────────────────────────────────────────
testpaths    = tests
python_files = test_*.py
python_classes  = Test*
python_functions = test_*

# ── Default CLI options ─────────────────────────────────────────────
#
#  WHY these exact --cov= flags?
#  ─────────────────────────────
#  OLD (broken):  --cov=. --cov=ui
#    • "--cov=." already covers EVERYTHING under the project root,
#      so "--cov=ui" is redundant and causes double-counting in the
#      HTML report.  It also measures the tests/ folder itself, which
#      inflates the total line count and produces misleading numbers.
#
#  NEW (correct): list only the SOURCE packages/modules explicitly.
#    • main, config, messages  → top-level modules
#    • core                    → core/ package
#    • ui                      → ui/ package  (layout.py, popups.py,
#                                              state.py are all inside)
#    • --cov-config=.coveragerc → tells coverage.py which paths to
#      omit (tests/, conftest.py, etc.) so those never pollute the %.
#
#  NOTE: "--cov=ui" alone is enough to cover layout.py, popups.py,
#  AND state.py because they all live inside the ui/ package.
#  Do NOT add "--cov=ui/layout" or "--cov=ui/popups" as separate
#  flags; that re-adds the same lines and breaks the HTML merge.
#
addopts =
    --cov=main
    --cov=config
    --cov=messages
    --cov=core
    --cov=ui
    --cov-report=html:tests/reports/coverage_html
    --cov-report=term-missing
    --cov-config=.coveragerc

# ── Custom markers ──────────────────────────────────────────────────
#  Declaring markers here silences PytestUnknownMarkWarning and lets
#  the team use  -m "not slow"  or  -m benchmark  on the CLI.
markers =
    slow:        marks tests as slow          (deselect with -m "not slow")
    benchmark:   marks performance benchmarks (deselect with -m "not benchmark")
    ui:          marks UI widget / layout tests
    integration: marks integration tests that exercise main.py workers
